name: Sync Copilot Instructions
description: "Syncs Copilot instructions from the repository to the GitHub Action's metadata file."
inputs:
  copilot_instructions_ref:
    description: "The ref to sync from the eps-copilot-instructions repository"
    required: false
    default: "main"
  calling_repo_base_branch:
    description: "The base branch from the calling repository that should be merged into"
    required: false
    default: main
  CREATE_PULL_REQUEST_APP_ID:
    description: "GitHub App ID for creating pull requests"
    required: true
  CREATE_PULL_REQUEST_PEM:
    description: "Private key for the GitHub App in PEM format"
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout calling repo code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ inputs.calling_repo_base_branch }}
        fetch-depth: 0
        persist-credentials: false

    - name: Checkout central repo code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ inputs.copilot_instructions_ref }}
        fetch-depth: 0
        path: eps-copilot-instructions
        repository: NHSDigital/eps-copilot-instructions
        persist-credentials: false
        sparse-checkout: |
          .github/instructions/general
          .github/instructions/languages
          .github/copilot-instructions.md
          .github/prompts

    - name: Copy central instructions
      shell: bash
      run: |
        rm -rf .github/instructions/general
        rm -rf .github/instructions/languages
        rm -rf .github/copilot-instructions.md
        rm -rf .github/prompts
        mkdir -p .github/instructions/
        cp -R eps-copilot-instructions/.github/instructions/general .github/instructions/general
        cp -R eps-copilot-instructions/.github/instructions/languages .github/instructions/languages
        cp eps-copilot-instructions/.github/copilot-instructions.md .github/copilot-instructions.md
        cp -R eps-copilot-instructions/.github/prompts .github/prompts
        rm -rf eps-copilot-instructions

    - name: Create GitHub App Token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      id: generate-token
      with:
        app-id: "${{ inputs.CREATE_PULL_REQUEST_APP_ID }}"
        private-key: "${{ inputs.CREATE_PULL_REQUEST_PEM }}"

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      with:
        token: "${{ steps.generate-token.outputs.token }}"
        commit-message: "Upgrade: [dependabot] - sync Copilot instructions"
        title: "Upgrade: [dependabot] - sync Copilot instructions"
        body: |
          Syncing Copilot instructions from central repo.
          Ref: `${{ inputs.copilot_instructions_ref }}`
        branch: copilot-instructions-sync
        base: ${{ inputs.calling_repo_base_branch }}
        branch-suffix: random
        sign-commits: true
        delete-branch: true
